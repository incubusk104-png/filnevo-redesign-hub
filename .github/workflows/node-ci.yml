name: CI

on:
  push:
    branches: [ "main", "master", "devin/1780026774-caveat-vault" ]
  # Run on every merge request, regardless of the target branch, so the
  # build/type-check gate runs before anything is merged or deployed.
  pull_request:

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "npm"
    - name: Install dependencies
      run: npm ci
    - name: Build (Next.js — also type-checks)
      run: npm run build
